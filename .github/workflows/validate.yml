# CI (docs/10 R11). Fast gates on every push/PR; the full corpus sweep
# (~10 min locally, longer on 4-core runners) runs weekly and on demand.
# Toolchain is pinned by .tool-versions — gate results are only reproducible
# on that pin (see README).
name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1" # weekly full sweep, Monday 03:17 UTC

jobs:
  gates:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # -U postgres: a bare pg_isready probes as the exec user (root), and the
        # server logs `FATAL: role "root" does not exist` once per 5s interval
        # for the whole run — pg_isready still exits 0 (it checks reachability,
        # not auth), so the noise never failed anything, it just buried the log.
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ hashFiles('mix.lock', '.tool-versions') }}
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix test
      # Whole-solution raise-mutant gate over single/multifile/wt shapes.
      - run: elixir scripts/validate.exs --mutants
      # Corpus canonical-format gate (docs/10 R6).
      - run: elixir scripts/format_corpus.exs --check
      # tfim prompt embeds must match their parents (docs/10 §5.14 / docs/11 §1a):
      # the dry run must report 0 errors and 0 would_resync, else prompts have
      # drifted from the parent files they display.
      - run: |
          out=$(mix run scripts/resync_tfim_embeds.exs)
          echo "$out"
          echo "$out" | grep -q "would_resync\|error" && exit 1 || true
      # module-FIM + wt_ embeds must match their parents (docs/12 §5.1 item 8):
      # zero reflow and zero drift since the 2026-07-12 remediation. The
      # planted-phantom self-test proves the checker is not vacuous.
      - run: elixir scripts/check_embeds.exs --self-test
      - run: |
          out=$(elixir scripts/check_embeds.exs)
          echo "$out"
          echo "$out" | grep -q "^embed check: .*, 0 reflow, 0 drift, " || exit 1
      # Full perfect-score sweep: weekly + manual only (too slow per push).
      - if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: elixir scripts/validate.exs
      - if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: elixir scripts/validate.exs --fim
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validate-results
          path: results/
          if-no-files-found: ignore

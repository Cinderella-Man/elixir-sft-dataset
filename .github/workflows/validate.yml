# CI (docs/10 R11). Fast gates on every push/PR; the full corpus sweep
# (~10 min locally, longer on 4-core runners) runs weekly and on demand.
# Toolchain is pinned by .tool-versions — gate results are only reproducible
# on that pin (see README).
name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1" # weekly full sweep, Monday 03:17 UTC

jobs:
  gates:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # -U postgres: a bare pg_isready probes as the exec user (root), and the
        # server logs `FATAL: role "root" does not exist` once per 5s interval
        # for the whole run — pg_isready still exits 0 (it checks reachability,
        # not auth), so the noise never failed anything, it just buried the log.
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          # check_screen_freshness compares legacy ledger rows against per-file
          # `git log` dates; a shallow clone reports every file as committed at
          # the tip → 261 false STALEs (2026-07-14). The gate also self-guards.
          fetch-depth: 0
      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ hashFiles('mix.lock', '.tool-versions') }}
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix test
      # Whole-solution raise-mutant gate over single/multifile/wt shapes.
      - run: elixir scripts/validate.exs --mutants
      # Corpus canonical-format gate (docs/10 R6).
      - run: elixir scripts/format_corpus.exs --check
      # tfim prompt embeds must match their parents (docs/10 §5.14 / docs/11 §1a):
      # the dry run must report 0 errors and 0 would_resync, else prompts have
      # drifted from the parent files they display.
      - run: mix run scripts/resync_tfim_embeds.exs -- --self-test
      - run: |
          out=$(mix run scripts/resync_tfim_embeds.exs)
          echo "$out"
          echo "$out" | grep -q "would_resync\|error" && exit 1 || true
      # bugfix_ prompts embed the parent task spec verbatim (docs/13 §1.1): a
      # parent-prompt edit must propagate, or 959 debugging tasks teach a stale
      # spec alongside a real bug.
      - run: mix run scripts/resync_bugfix_embeds.exs -- --self-test
      - run: |
          out=$(mix run scripts/resync_bugfix_embeds.exs)
          echo "$out"
          echo "$out" | grep -q "would_resync\|error" && exit 1 || true
      # adapt_ dirs are deterministic projections of (base gold, variation
      # prompt/gold/harness) — docs/13 §2.1. Editing any parent must propagate,
      # or the pair teaches a stale starting point or grades against a stale gate.
      # --self-test first proves the gate itself bites (planted drift is caught
      # and healed in a sandbox) before the dry run is trusted.
      - run: mix run scripts/resync_adapt_embeds.exs -- --self-test
      - run: |
          out=$(mix run scripts/resync_adapt_embeds.exs)
          echo "$out"
          echo "$out" | grep -q "would_resync\|error" && exit 1 || true
      # dedoc_ dirs are deterministic projections of the parent _01 (docs/13
      # §2.3): a parent gold/harness edit must propagate, or 325 documentation
      # pairs teach a stale module. Same self-test-then-dry-run pattern.
      - run: mix run scripts/resync_dedoc_embeds.exs -- --self-test
      - run: |
          out=$(mix run scripts/resync_dedoc_embeds.exs)
          echo "$out"
          echo "$out" | grep -q "would_resync\|error" && exit 1 || true
      # Harnesses must not share a temp path across parallel evals: the validator
      # runs one BEAM per task, and System.unique_integer is unique only WITHIN a
      # BEAM, so two evals can open the same SQLite file (flaky 1-in-3 failures in
      # 102_002; 102_003 latent; 102_004 used a fixed filename). docs/14 §5.0b.
      - run: mix run scripts/lint_temp_paths.exs
      # The S6 blind verdict belongs to the (prompt, harness) PAIR: a harness
      # edit silently invalidates the screen-ledger row (found live 2026-07-13:
      # 47 R10-tightened harnesses were never blind-re-proven). STALE = gate
      # failure; a re-screen is ~1 solver call per family (STATUS F2).
      - run: mix run scripts/check_screen_freshness.exs -- --self-test
      - run: mix run scripts/check_screen_freshness.exs
      # The export contract (docs/16): 91.7% within-family text overlap means a
      # naive split leaks train->val and makes every eval a memorisation score.
      # The exporter is the ONLY sanctioned path to training data; --selfcheck
      # proves the gate bites (8 planted violations), --check validates the
      # export re-derived from the current corpus. No LLM, no eval: cheap.
      - run: mix run scripts/export_dataset.exs -- --selfcheck
      - run: |
          mix run scripts/export_dataset.exs
          mix run scripts/export_dataset.exs -- --check
      # F24 corpus-integrity parse gate non-vacuity: a planted fim gold opening
      # with a dangling heredoc closer must be flagged (2026-07-19).
      - run: elixir scripts/validate.exs --self-test-integrity
      # sfim children embed the parent SPEC verbatim ("## The task" section);
      # module-FIM resync only re-derives the skeleton fence, so a parent-prompt
      # edit silently staled them (gap filed + closed 2026-07-19, F24 night).
      - run: mix run scripts/resync_sfim_specs.exs -- --self-test
      - run: |
          out=$(mix run scripts/resync_sfim_specs.exs)
          echo "$out"
          echo "$out" | grep -q "would_resync\|ERROR" && exit 1 || true
      # wt_ dirs are byte-copies of their parent (module + harness) plus a prompt
      # that embeds the parent SPEC. check_embeds only sees the module fence, so
      # until 2026-07-13 a parent-prompt or harness edit rotted wt_ silently (it
      # had: 51 stale dirs, incl. 3 stale gold harnesses).
      - run: mix run scripts/resync_embeds.exs -- --self-test-auto
      - run: |
          out=$(mix run scripts/resync_embeds.exs -- --wt-all)
          echo "$out"
          echo "$out" | grep -q "would_resync\|error" && exit 1 || true
      # module-FIM + wt_ embeds must match their parents (docs/12 §5.1 item 8):
      # zero reflow and zero drift since the 2026-07-12 remediation. The
      # planted-phantom self-test proves the checker is not vacuous.
      - run: elixir scripts/check_embeds.exs --self-test
      - run: |
          out=$(elixir scripts/check_embeds.exs)
          echo "$out"
          echo "$out" | grep -q "^embed check: .*, 0 reflow, 0 drift, " || exit 1
      # Full perfect-score sweep: weekly + manual only (too slow per push).
      - if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: elixir scripts/validate.exs
      - if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: elixir scripts/validate.exs --fim
      # Weekly rot detectors (STATUS T3.2; CONTEXT rule 8 — spot-check BOTH
      # sides). Accepted side: the six-property bugfix audit on a random
      # sample (properties the perfect sweep cannot see: bug reproduces,
      # report matches, gold ≡ parent, one-line diff). Rejected side: every
      # current reject row re-derived through the real gates — a fresh
      # checkout has no audit ledger, so nothing is skipped; fails on LIVE
      # unsound rows (a ledger blocking mintable data) or parent rot.
      - if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: mix run scripts/audit_bugfix.exs $(ls -d tasks/bugfix_* | shuf -n 15 | sed 's|tasks/||')
      - if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: mix run scripts/reverify_rejects.exs -- --bugfix-sample 25
      # T1.6 (docs/13 §2.6): specs are training targets — machine-check every
      # gold's @spec/@type against dialyzer success typings. The PLT rides the
      # _build cache (rebuilt only when mix.lock changes); a fresh checkout has
      # no ledger, so nothing is skipped. --self-test first: the gate must
      # prove it bites (planted contract lie + overspec) and stays silent
      # (private helper, GenServer wrapper, clean module) before its verdicts
      # are trusted. Exit 1 on any warnings/error row = red.
      - if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: mix dialyzer --plt
      - if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: mix run scripts/dialyzer_golds.exs -- --self-test
      - if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: mix run scripts/dialyzer_golds.exs
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validate-results
          path: results/
          if-no-files-found: ignore
